<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h3 class="mb-4 text-center">Admin</h3>

    <div class="card">
        <div class="card-body">
            <h5>Add New User</h5>
            <div class="input-group mb-3">
                <input type="text" id="userName" class="form-control" placeholder="Unique name">
                <button class="btn btn-success" id="addBtn">Add</button>
            </div>
            <a href="index.html" class="btn btn-outline-secondary">Back to Home</a>
        </div>
    </div>

    <div class="card mt-4">
        <div class="card-body">
            <h5>Users</h5>
            <div class="table-responsive">
                <table class="table table-striped" id="userTable">
                    <thead><tr><th>ID</th><th>Name</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

<script>
// ========================
// PAGE LOAD
// ========================
document.addEventListener("DOMContentLoaded", async function() {
  // PASSWORD CHECK (client prompt, but backend verifies)
  const pw = prompt("Enter admin password:");
  if (!pw) {
    window.location.href = "index.html";
    return;
  }

  await fetchUsers();
  renderUsers();

  // BUTTON CLICK
  document.getElementById("addBtn").addEventListener("click", async function() {
    const name = document.getElementById("userName").value.trim();
    try {
      const res = await fetch('/api/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, password: pw })
      });
      if (!res.ok) {
        const err = await res.json();
        alert(err.error);
        return;
      }
      await fetchUsers();
      renderUsers();
      document.getElementById("userName").value = "";
      alert("User added successfully!");
    } catch (err) {
      alert('Error adding user: ' + err.message);
    }
  });
});

// ========================
// RENDER USERS
// ========================
function renderUsers() {
  const tbody = document.querySelector("#userTable tbody");
  tbody.innerHTML = "";

  users.forEach(user => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${user.id}</td>
      <td>${user.name}</td>
    `;
    tbody.appendChild(tr);
  });
}
</script>

</body>
</html>
