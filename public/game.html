<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dhumble Game</title>

  <!-- Bootstrap 5.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-2">
    <h4 class="text-center mb-2">Scoreboard</h4>

    <div id="elimScoreDisplay" class="text-center mb-3 fw-bold">
        Elimination Score: <span id="elimScoreValue">—</span>
    </div>

    <div id="winnerBanner"></div>

    <div class="card">
        <div class="card-body">
            <!-- Table always visible -->
            <div class="table-responsive">
                <table class="table table-bordered table-hover" id="gameHistory">
                    <thead>
                        <tr>
                            <th>Player</th>
                            <th>Total</th>
                            <th>History</th>
                            <th>Point Scored</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

            <!-- Controls only visible during active game -->
            <div id="gameControls" class="mt-4 text-center">
                <button id="submitRoundBtn" class="btn btn-sm btn-primary me-3" onclick="submitRoundScores()">
                    Submit Round
                </button>
                <button class="btn btn-sm btn-outline-danger" onclick="cancelGame()">
                    Cancel Game
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- SCRIPT FILES -->
<script src="js/constants.js"></script>
<script src="js/sounds.js"></script>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/player-stats.js"></script>
<script src="js/render.js"></script>
<script src="js/game-logic.js"></script>
<script src="js/live-socket.js"></script>
<script src="js/main.js"></script>

<script>
// Game page init
document.addEventListener('DOMContentLoaded', async () => {
  await fetchUsers();
  currentGame = await fetchOngoingGame();

  if (!currentGame) {
    document.body.innerHTML = `
      <div class="container mt-5 text-center">
        <h2 class="text-danger">No active game found.</h2>
        <a href="index.html" class="btn btn-primary mt-3">Go to Home</a>
      </div>`;
    return;
  }

  document.getElementById('elimScoreValue').textContent = currentGame.elimScore;
  renderGameTable();

  if (currentGame.status === 'completed') {
    showWinner();
  }
});

// Handle browser back button
history.pushState(null, null, location.href);

window.addEventListener("popstate", async function () {

    if (confirm("Cancel game and lose all points?")) {

        await fetch('/api/games/ongoing', {
            method: 'DELETE'
        });

        window.location.href = "index.html";

    } else {
        history.pushState(null, null, location.href);
    }

});

</script>

<!-- Sound Effects -->
<audio id="elimSound" src="sounds/coffin.mp3" preload="auto"></audio>
<audio id="funnySound" src="sounds/laugh.mp3" preload="auto"></audio>
<audio id="highScoreSound" src="sounds/thukka.mp3" preload="auto"></audio>
<audio id="nearElimSound" src="sounds/udyo.mp3" preload="auto"></audio>
<audio id="winnerSound" src="sounds/winner.mp3" preload="auto"></audio>
</body>
</html>
